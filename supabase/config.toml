# Supabase CLI configuration for the Achv Evaluation App.
# `supabase` reads this when running `supabase start`, `supabase db push`, etc.

project_id = "achv-evaluation-app"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = false  # We disable email/password — Google SSO only
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"
# Domain restriction is enforced by the email CHECK constraint on profiles
# table (must end in @mfu.ac.th) and by middleware on the app side.

[storage]
enabled = true
file_size_limit = "50MiB"
